# A list of containers that should run the pods of this component
containers: []

# Defines a rolling update strategy for the component
rollingUpdate:
  enabled: true

# Defines a list of init containers for the component
initContainers: []

# Defines a number of replicas for the component
replicas: 1

# Job or CronJob specific configuration
job: {}
  # A schedule for a CronJob. If set, this component will be a CronJob instead of a Deployment else it will be a Job.
  # "*/5 * * * *"
  # schedule: ''
  # backoffLimit: 4
  # activeDeadlineSeconds: 100
  # ttlSecondsAfterFinished: 100
  # concurrencyPolicy: Allow
  # failedJobsHistoryLimit: 1
  # successfulJobsHistoryLimit: 3
  # startingDeadlineSeconds: 100
  # suspend: false

# Defines a service for the component
service:
  type: ClusterIP
  labels: {}
  annotations: {}
  ports: []
  externalIPs: []

# Labels for the component
labels: {}

# Annotations for the component
annotations: {}

# Ingress for the component
ingress:
  disabled: false
  labels: {}
  annotations: {}
  certmanager: true
  rules: []

# Persistent volumes for the component
# Then mount them in containers above
volumes: []

# Defines image pull secrets
# DevSpace CLI will append all pull secrets which are automatically created
# More infos on: https://devspace.cloud/docs/cli/image-building/workflow-basics#8-create-image-pull-secret
pullSecrets: []

# Service account for the component
serviceaccount: {}

# Config map for the component
configmap: {}

# Secret for the component
secrets: {}

# HTTP routes for the gateway API ingress of the component
httpRoutes: []
  # - name: my-http-route
  #   apiVersion: gateway.networking.k8s.io/v1
  #   labels: {}
  #   annotations: {}
  #   spec:
  #     parentRefs:
  #       - name: my-gateway
  #     hostnames:
  #       - example.com
  #     rules:
  #       - matches:
  #           - path:
  #               type: PathPrefix
  #               value: /
  #         backendRefs:
  #           - name: my-service
  #             port: 80

# External secrets for the component
externalSecrets: {}
  # secretstore:                     # Optional SecretStore resource to create
  #   # ref: https://external-secrets.io/latest/api/secretstore/
  #   name: my-secret-store          # Default: release name
  #   labels: {}
  #   annotations: {}
  #   provider: {}                   # Required when secretstore is set
  # secrets:                         # List of ExternalSecret resources
  #   # ref: https://external-secrets.io/latest/api/externalsecret/
  #   - name: my-external-secret
  #     annotations: {}
  #     refreshInterval: "0s"        # Default: "0s" to disable auto-refresh, or "1h", "5m", etc.
  #     secretStoreRef:
  #       name: my-secret-store      # Default order: secretStoreRef.name -> externalSecrets.secretstore.name -> release name
  #       kind: SecretStore          # Default: SecretStore
  #     target:
  #       name: my-external-secret
  #       creationPolicy: Owner
  #     data:
  #       - secretKey: MY_SECRET_KEY
  #         remoteRef:
  #           key: /path/to/parameter

# List of any extra Kubernetes manifests (CRDs) needed for the component
extraObjects: []
