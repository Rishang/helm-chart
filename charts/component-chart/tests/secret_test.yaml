suite: component-chart / secret
release:
  name: demo
  namespace: default
values:
  - values/secret.yaml
templates:
  - templates/config-secrets.yaml
tests:
  - it: renders an Opaque Secret with stringData and annotations
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: demo
      - equal:
          path: type
          value: Opaque
      - equal:
          path: metadata.annotations["avp.kubernetes.io/path"]
          value: app
      - equal:
          path: stringData.SECRET
          value: "<demo-secret>"
