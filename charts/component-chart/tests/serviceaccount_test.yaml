suite: component-chart / serviceaccount
release:
  name: demo
  namespace: default
values:
  - test/values.yaml
templates:
  - templates/service-account.yaml
tests:
  - it: renders a ServiceAccount with the configured name
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: storage-reader
      - equal:
          path: metadata.labels."app.kubernetes.io/name"
          value: demo

