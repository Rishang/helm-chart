suite: component-chart / service
release:
  name: demo
  namespace: default
values:
  - test/values.yaml
templates:
  - templates/service.yaml
tests:
  - it: renders a ClusterIP service with expected ports and selectors
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: demo
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: 80
      - equal:
          path: spec.selector."app.kubernetes.io/name"
          value: devspace-app
      - equal:
          path: spec.selector."app.kubernetes.io/component"
          value: demo

