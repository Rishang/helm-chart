suite: component-chart / statefulset detection
release:
  name: demo
  namespace: default
values:
  - tests/values/statefulset.yaml
templates:
  - templates/deployment.yaml
tests:
  - it: renders a StatefulSet when a non-readOnly PVC-backed volumeMount exists
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: demo
      - equal:
          path: spec.serviceName
          value: demo-headless
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 1Gi

  - it: renders a headless Service for the StatefulSet
    asserts:
      - isKind:
          of: Service
          documentIndex: 1
      - equal:
          path: metadata.name
          value: demo-headless
          documentIndex: 1
      - equal:
          path: spec.clusterIP
          value: None
          documentIndex: 1

