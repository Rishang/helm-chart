{{- range $containerIndex, $containerUnused := $.Values.containers }}
{{- if eq $containerIndex 0 }}

{{/*
  ─── Determine resource kind ───────────────────────────────────────────────
  Priority:
    1. CronJob  – $.Values.job is set AND job.schedule is non-empty
    2. Job      – $.Values.job is set (no schedule)
    3. StatefulSet – any container has a non-readOnly volumeMount backed by a
                     PVC (i.e. not secret / configMap / emptyDir / hostPath)
    4. Deployment  – everything else
*/}}

{{- $kind := "Deployment" }}

{{- if $.Values.job }}
  {{- if $.Values.job.schedule }}
    {{- $kind = "CronJob" }}
  {{- else }}
    {{- $kind = "Job" }}
  {{- end }}
{{- else }}
  {{- range $containerIndex, $container := $.Values.containers }}
    {{- range $volumeMountIndex, $volumeMount := $container.volumeMounts }}
      {{- if not $volumeMount.volume.readOnly }}
        {{- range $volumeIndex, $volume := $.Values.volumes }}
          {{- if not (or (hasKey $volume "secret") (hasKey $volume "configMap") (hasKey $volume "emptyDir") (hasKey $volume "hostPath")) }}
            {{- if eq $volumeMount.volume.name $volume.name }}
              {{- $kind = "StatefulSet" }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- $allContainers := list }}
{{- range $idx, $container := $.Values.containers }}
  {{- $allContainers = append $allContainers $container }}
{{- end }}
{{- range $idx, $initContainer := $.Values.initContainers }}
  {{- $allContainers = append $allContainers $initContainer }}
{{- end }}

apiVersion: {{ if eq $kind "CronJob" }}batch/v1{{ else if eq $kind "Job" }}batch/v1{{ else }}apps/v1{{ end }}
kind: {{ $kind }}
metadata:
  name: {{ $.Release.Name | quote }}
  labels:
    "app.kubernetes.io/name": "devspace-app"
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
    {{- range $labelName, $labelValue := $.Values.labels }}
    {{ $labelName | quote }}: {{ $labelValue | quote }}
    {{- end }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    {{- range $annotationName, $annotationValue := $.Values.annotations }}
    {{ $annotationName | quote }}: {{ $annotationValue | quote }}
    {{- end }}
spec:
  {{/*
    ── CronJob spec ──────────────────────────────────────────────────────────
  */}}
  {{- if eq $kind "CronJob" }}
  schedule: {{ $.Values.job.schedule | quote }}
  {{- if $.Values.job.concurrencyPolicy }}
  concurrencyPolicy: {{ $.Values.job.concurrencyPolicy }}
  {{- end }}
  {{- if hasKey $.Values.job "suspend" }}
  suspend: {{ $.Values.job.suspend }}
  {{- end }}
  {{- if hasKey $.Values.job "startingDeadlineSeconds" }}
  startingDeadlineSeconds: {{ $.Values.job.startingDeadlineSeconds }}
  {{- end }}
  {{- if hasKey $.Values.job "failedJobsHistoryLimit" }}
  failedJobsHistoryLimit: {{ $.Values.job.failedJobsHistoryLimit }}
  {{- end }}
  {{- if hasKey $.Values.job "successfulJobsHistoryLimit" }}
  successfulJobsHistoryLimit: {{ $.Values.job.successfulJobsHistoryLimit }}
  {{- end }}
  jobTemplate:
    metadata:
      labels:
        "app.kubernetes.io/name": "devspace-app"
        "app.kubernetes.io/component": {{ $.Release.Name | quote }}
        "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
        {{- range $labelName, $labelValue := $.Values.labels }}
        {{ $labelName | quote }}: {{ $labelValue | quote }}
        {{- end }}
      annotations:
        "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
        {{- range $annotationName, $annotationValue := $.Values.annotations }}
        {{ $annotationName | quote }}: {{ $annotationValue | quote }}
        {{- end }}
    spec:
      {{- if hasKey $.Values.job "backoffLimit" }}
      backoffLimit: {{ $.Values.job.backoffLimit }}
      {{- end }}
      {{- if hasKey $.Values.job "activeDeadlineSeconds" }}
      activeDeadlineSeconds: {{ $.Values.job.activeDeadlineSeconds }}
      {{- end }}
      {{- if hasKey $.Values.job "ttlSecondsAfterFinished" }}
      ttlSecondsAfterFinished: {{ $.Values.job.ttlSecondsAfterFinished }}
      {{- end }}
      template:
{{ include "component.podTemplate" $ | indent 8 }}
  {{- end }}{{/* end CronJob */}}
  {{/*
    ── Job spec ──────────────────────────────────────────────────────────────
  */}}
  {{- if eq $kind "Job" }}
  {{- if hasKey $.Values.job "backoffLimit" }}
  backoffLimit: {{ $.Values.job.backoffLimit }}
  {{- end }}
  {{- if hasKey $.Values.job "activeDeadlineSeconds" }}
  activeDeadlineSeconds: {{ $.Values.job.activeDeadlineSeconds }}
  {{- end }}
  {{- if hasKey $.Values.job "ttlSecondsAfterFinished" }}
  ttlSecondsAfterFinished: {{ $.Values.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
{{ include "component.podTemplate" $ | indent 4 }}
  {{- end }}{{/* end Job */}}
  {{/*
    ── Deployment / StatefulSet spec ─────────────────────────────────────────
  */}}
  {{- if or (eq $kind "Deployment") (eq $kind "StatefulSet") }}
  {{- if not $.Values.autoScaling }}
  replicas: {{ $.Values.replicas | default 1 }}
  {{- end }}
  revisionHistoryLimit: {{ $.Values.revisionHistoryLimit | default 3 }}
  {{- if eq $kind "Deployment" }}
  strategy:
    {{- if and $.Values.rollingUpdate $.Values.rollingUpdate.enabled }}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ $.Values.rollingUpdate.maxSurge | default "25%" }}
      maxUnavailable: {{ $.Values.rollingUpdate.maxUnavailable | default "0%" }}
    {{- else }}
    type: Recreate
    {{- end }}
  {{- end }}
  {{- if eq $kind "StatefulSet" }}
  {{- if and $.Values.rollingUpdate $.Values.rollingUpdate.enabled }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: {{ $.Values.rollingUpdate.partition | default 0 }}
  {{- end }}
  podManagementPolicy: {{ $.Values.podManagementPolicy | default "OrderedReady" | quote }}
  {{- if $.Values.serviceName }}
  serviceName: {{ $.Values.serviceName | quote }}
  {{- else }}
  serviceName: "{{ $.Release.Name }}-headless"
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      "app.kubernetes.io/name": "devspace-app"
      "app.kubernetes.io/component": {{ $.Release.Name | quote }}
      "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
      {{- range $labelName, $labelValue := $.Values.labels }}
      {{ $labelName | quote }}: {{ $labelValue | quote }}
      {{- end }}
  template:
{{ include "component.podTemplate" $ | indent 4 }}
  {{- if eq $kind "StatefulSet" }}
  volumeClaimTemplates:
    {{- range $volumeIndex, $volume := $.Values.volumes }}
    {{- if not (or $volume.secret $volume.configMap (hasKey $volume "emptyDir") (hasKey $volume "hostPath")) }}
    {{- $isVolumeTemplateOfThisComponent := false }}
    {{- range $containerIndex, $container := $allContainers }}
      {{- range $volumeMountIndex, $volumeMount := $container.volumeMounts }}
        {{- if not (or $volumeMount.volume.readOnly $volumeMount.volume.shared) }}
          {{- if eq $volume.name $volumeMount.volume.name }}
            {{- $isVolumeTemplateOfThisComponent = true }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if $isVolumeTemplateOfThisComponent }}
  - metadata:
      name: {{ $volume.name | quote }}
      labels:
        "app.kubernetes.io/name": "devspace-app"
        "app.kubernetes.io/component": {{ $.Release.Name | quote }}
        "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
        {{- range $labelName, $labelValue := $volume.labels }}
        {{ $labelName | quote }}: {{ $labelValue | quote }}
        {{- end }}
      annotations:
        "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
        {{- range $annotationName, $annotationValue := $volume.annotations }}
        {{ $annotationName | quote }}: {{ $annotationValue | quote }}
        {{- end }}
    spec:
      {{- if $volume.storageClassName }}
      storageClassName: {{ $volume.storageClassName }}
      {{- end }}
      {{- if $volume.volumeMode }}
      volumeMode: {{ $volume.volumeMode }}
      {{- end }}
      {{- if $volume.volumeName }}
      volumeName: {{ $volume.volumeName }}
      {{- end }}
      {{- if $volume.dataSource }}
      dataSource:
{{ toYaml $volume.dataSource | indent 8 }}
      {{- end }}
      accessModes:
      {{- if $volume.accessModes }}
{{ toYaml $volume.accessModes | indent 8 }}
      {{- else }}
      - ReadWriteOnce
      {{- end }}
      resources:
        requests:
          storage: {{ $volume.size | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}{{/* end StatefulSet volumeClaimTemplates */}}
  {{- end }}{{/* end Deployment / StatefulSet */}}

---

{{/* Create headless service for StatefulSet */}}
{{- if eq $kind "StatefulSet" }}
apiVersion: v1
kind: Service
metadata:
  {{- if $.Values.serviceName }}
  name: {{ $.Values.serviceName | quote }}
  {{- else }}
  name: "{{ $.Release.Name }}-headless"
  {{- end }}
  labels:
    "app.kubernetes.io/name": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
    {{- range $labelName, $labelValue := $.Values.labels }}
    {{ $labelName | quote }}: {{ $labelValue | quote }}
    {{- end }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    {{- range $annotationName, $annotationValue := $.Values.annotations }}
    {{ $annotationName | quote }}: {{ $annotationValue | quote }}
    {{- end }}
spec:
  ports:
  # At least one port is required to have Kubernetes define an endpoint which is required for DNS to work
  - port: 80
    name: web
  clusterIP: None
  selector:
    "app.kubernetes.io/name": "devspace-app"
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
    {{- range $labelName, $labelValue := $.Values.labels }}
    {{ $labelName | quote }}: {{ $labelValue | quote }}
    {{- end }}
---
{{- end }}{{/* end headless Service */}}

{{- end }}{{/* end if containerIndex == 0 */}}
{{- end }}{{/* end range containers */}}