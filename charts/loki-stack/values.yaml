rustfs:
  # Optional in-cluster S3-compatible object storage for Loki.
  # Disabled by default; enable only if you want this chart to deploy RustFS from https://github.com/rustfs/helm.
  enabled: false
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  ingress:
    enabled: false
  secret:
    # To use an existing Kubernetes Secret for RustFS credentials, set `existingSecret`
    # to the Secret name and leave/create these keys in that Secret:
    #   RUSTFS_ACCESS_KEY: <base64-encoded access key>
    #   RUSTFS_SECRET_KEY: <base64-encoded secret key>
    #
    # existingSecret: rustfs-credentials
    rustfs:
      access_key: rustfsadmin
      secret_key: rustfsadmin
  config:
    rustfs:
      region: us-east-1 # <region of your RustFS>
  storageclass:
    name: local-path # <name of your storage class>
    dataStorageSize: 10Gi # <size of your data storage>
    logStorageSize: 1Gi # <size of your log storage>

tempo:
  # Optional trace storage backend.
  # Enable this with alloy.otlp.enabled to collect app traces over OTLP.
  enabled: false
  tempo:
    retention: 24h
    reportingEnabled: false
    storage:
      trace:
        # Default: local filesystem. To use the in-cluster RustFS instead, enable
        # rustfs.enabled above, then uncomment the s3 block below and set backend: s3.
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        #
        # For RustFS deployed by this chart, use: http://<release-name>-rustfs-svc:9000
        # backend: s3
        # s3:
        #   bucket: tempo-traces
        #   endpoint: <release-name>-rustfs-svc:9000
        #   access_key: rustfsadmin       # must match rustfs.secret.rustfs.access_key
        #   secret_key: rustfsadmin       # must match rustfs.secret.rustfs.secret_key
        #   insecure: true
        #   s3ForcePathStyle: true
  persistence:
    enabled: false
    # size: 10Gi
    # storageClassName: default
  serviceMonitor:
    enabled: false

mimir:
  # Optional long-term metrics backend.
  # kube-prometheus-stack already provides Prometheus; enable Mimir only when you want scalable remote-write storage.
  enabled: false
  # By default Mimir ships its own MinIO; to use the shared RustFS instead,
  # set minio.enabled=false and configure structuredConfig.common.storage below.
  minio:
    enabled: true
    persistence:
      size: 5Gi
  # -- Use RustFS as Mimir's object store (replaces built-in MinIO)
  # To switch, set mimir.minio.enabled=false, enable rustfs.enabled above,
  # and uncomment the structuredConfig block below.
  #
  # mimir:
  #   structuredConfig:
  #     common:
  #       storage:
  #         backend: s3
  #         s3:
  #           endpoint: <release-name>-rustfs-svc:9000
  #           bucket_name: mimir-tsdb
  #           access_key_id: rustfsadmin       # must match rustfs.secret.rustfs.access_key
  #           secret_access_key: rustfsadmin   # must match rustfs.secret.rustfs.secret_key
  #           insecure: true
  #     ruler_storage:
  #       backend: s3
  #       s3:
  #         bucket_name: mimir-ruler
  #     alertmanager_storage:
  #       backend: s3
  #       s3:
  #         bucket_name: mimir-alertmanager
  metaMonitoring:
    serviceMonitor:
      enabled: false
    prometheusRule:
      enabled: false
  gateway:
    enabled: true

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    # Default Loki container security context override:
    # With persistence disabled and no /var/loki emptyDir mount, Loki must be allowed to write to /var/loki.
    # If you prefer readOnlyRootFilesystem=true, enable persistence or add the emptyDir mount under `singleBinary` above.
    containerSecurityContext:
      readOnlyRootFilesystem: true
    # -- Storage config. Providing this will automatically populate all necessary storage configs in the templated config.
    storage:
      # Loki requires a bucket for chunks and the ruler. GEL requires a third bucket for the admin API.
      # Please provide these values if you are using object storage.
      # bucketNames:
      #   chunks: FIXME
      #   ruler: FIXME
      #   admin: FIXME
      # Options: filesystem, s3, gcs, azure, swift, s3-compatible
      type: filesystem
      # s3:
      #   # Either use a single S3 URL...
      #   s3: s3://access_key:secret_access_key@custom_endpoint/bucket_name
      #
      #   # ...or the individual fields below.
      #
      #   # For RustFS deployed by this chart, use: http://<release-name>-rustfs-svc:9000
      #   endpoint: http://<release-name>-rustfs-svc:9000
      #   region: us-east-1
      #   secretAccessKey: rustfsadmin
      #   accessKeyId: rustfsadmin
      #   signatureVersion: v4
      #   s3ForcePathStyle: true
      #   insecure: true
      #   http_config: {}
      #   backoff_config: {}
      #   disable_dualstack: false
      #
      # gcs:
      #   chunkBufferSize: 0
      #   requestTimeout: "0s"
      #   enableHttp2: true
      #
      # azure:
      #   accountName: null
      #   accountKey: null
      #   connectionString: null
      #   useManagedIdentity: false
      #   useFederatedToken: false
      #   userAssignedId: null
      #   requestTimeout: null
      #   endpointSuffix: null
      #   chunkDelimiter: null
      #
      # swift:
      #   auth_version: null
      #   auth_url: null
      #   internal: null
      #   username: null
      #   user_domain_name: null
      #   user_domain_id: null
      #   user_id: null
      #   password: null
      #   domain_id: null
      #   domain_name: null
      #   project_id: null
      #   project_name: null
      #   project_domain_id: null
      #   project_domain_name: null
      #   region_name: null
      #   container_name: null
      #   max_retries: null
      #   connect_timeout: null
      #   request_timeout: null
      #
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules
    # -- Check https://grafana.com/docs/loki/latest/configuration/#schema_config for more info on how to configure schemas
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h # 7 days
      max_query_series: 1000
      max_query_lookback: 168h # 7 days
      volume_enabled: true
  
  chunksCache:
    enabled: false
  
  lokiCanary:
    enabled: false
  
  singleBinary:
    replicas: 1
    persistence:
      enabled: false
      # size: 10Gi
      # storageClass: null
    # Loki stores local data (chunks, ruler rules/WAL, etc.) under /var/loki by default.
    #
    # Defaults in this chart keep these empty to avoid the common "duplicate /var/loki mount" issue when
    # persistence is enabled (the Loki subchart mounts the PVC to /var/loki automatically).
    extraVolumes: []
    extraVolumeMounts: []
    #
    # If you run WITHOUT persistence *and* you want `readOnlyRootFilesystem: true`, you must mount a writable
    # volume at /var/loki (otherwise Loki will fail to write WAL and chunks).
    #
    # extraVolumes:
    #   - name: storage
    #     emptyDir: {}
    # extraVolumeMounts:
    #   - name: storage
    #     mountPath: /var/loki
  memcached:
    # -- Enable the built in memcached server provided by the chart
    enabled: true
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  # -- Used to directly query the metrics endpoint of the canary for testing, this approach avoids needing prometheus for testing.
  # This in a newer approach to using prometheusAddress such that tests do not have a dependency on prometheus
  test:
    enabled: false

alloy:
  enabled: true

  otlp:
    # Enable an OTLP endpoint on Alloy for application logs, metrics, and traces.
    # Apps can send OTLP/gRPC to <release-name>-alloy:4317 or OTLP/HTTP to <release-name>-alloy:4318.
    enabled: false
    metrics:
      # kube-prometheus-stack's Prometheus remote-write receiver is enabled below.
      # To write app metrics to Mimir instead, enable mimir.enabled and set:
      # remoteWriteUrl: http://{{ .Release.Name }}-mimir-gateway/api/v1/push
      remoteWriteUrl: http://{{ .Release.Name }}-kube-prometheus-sta-prometheus:9090/api/v1/write
    traces:
      # Tempo must be enabled when alloy.otlp.enabled is true.
      endpoint: http://{{ .Release.Name }}-tempo:4318

  # IMPORTANT: the Alloy chart expects config under the nested `alloy:` key.
  alloy:
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
    mounts:
      # Mount host /var/log so we can read /var/log/containers and /var/log/pods for ALL pods/namespaces.
      varlog: true
    configMap:
      content: |
        // 1. Target /var/log/pods (The Source of Truth)
        local.file_match "kubernetes" {
          path_targets = [
            {"__path__" = "/var/log/pods/*/*/*.log"},
          ]
        }

        // 2. Parse metadata (Updated Regex for /pods/ structure)
        discovery.relabel "kubernetes" {
          targets = local.file_match.kubernetes.targets

          // Path structure: /var/log/pods/<namespace>_<pod_name>_<uid>/<container_name>/<restart_count>.log

          // Extract Namespace ($1) - Matches text before the first underscore
          rule {
            source_labels = ["__path__"]
            regex         = ".*/var/log/pods/([^_]+)_.*"
            target_label  = "namespace"
          }

          // Extract Pod Name ($1) - Matches text between first and second underscore
          rule {
            source_labels = ["__path__"]
            regex         = ".*/var/log/pods/[^_]+_([^_]+)_.*"
            target_label  = "pod"
          }

          // Extract Container Name ($1) - Matches the folder name after the UID
          rule {
            source_labels = ["__path__"]
            regex         = ".*/var/log/pods/[^_]+_[^_]+_[^/]+/([^/]+)/.*"
            target_label  = "container"
          }

          rule {
            target_label = "job"
            replacement  = "kubernetes-logs"
          }

          // Node Name (Must come from Env Var, not metadata)
          rule {
            target_label = "node_name"
            replacement  = sys.env("HOSTNAME") // Ensure this Env Var is set on your pod
          }
        }

        // 3. Ingest
        loki.source.file "kubernetes" {
          targets    = discovery.relabel.kubernetes.output
          forward_to = [loki.process.kubernetes.receiver]
        }

        // 4. Process
        loki.process "kubernetes" {
          stage.cri {}

          // Ensure labels are applied
          stage.labels {
            values = {
              namespace = "namespace",
              pod       = "pod",
              container = "container",
              job       = "job",
              node_name = "node_name",
            }
          }

          forward_to = [loki.write.endpoint.receiver]
        }

        {{ tpl .Values.alloyConfigMapExtra . | nindent 2 }}

  # Extra configuration to be merged into the Alloy configMap Generally for configuring the write endpoints
  # This allows you to customize the loki.write endpoint or add additional configuration
  alloyConfigMapExtra: |
    {{- if .Values.otlp.enabled }}
    // receive application telemetry over OTLP and fan it out to Loki, Prometheus/Mimir, and Tempo
    otelcol.receiver.otlp "apps" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }

      http {
        endpoint = "0.0.0.0:4318"
      }

      output {
        logs    = [otelcol.exporter.loki.apps.input]
        metrics = [otelcol.exporter.prometheus.apps.input]
        traces  = [otelcol.exporter.otlphttp.tempo.input]
      }
    }

    otelcol.exporter.loki "apps" {
      forward_to = [loki.write.endpoint.receiver]
    }

    otelcol.exporter.prometheus "apps" {
      forward_to = [prometheus.remote_write.otlp_metrics.receiver]
    }

    prometheus.remote_write "otlp_metrics" {
      endpoint {
        url = "{{ tpl .Values.otlp.metrics.remoteWriteUrl . }}"
      }
    }

    otelcol.exporter.otlphttp "tempo" {
      client {
        endpoint = "{{ tpl .Values.otlp.traces.endpoint . }}"
      }
    }
    {{- end }}

    // write to the Loki endpoint
    loki.write "endpoint" {
      endpoint {
        url = "http://{{ .Release.Name }}-loki:3100/loki/api/v1/push"
      }
    }

kube-prometheus-stack:
  enabled: true

  prometheus:
    prometheusSpec:
      # Allows Alloy's OTLP metrics pipeline to remote-write converted app metrics into Prometheus.
      # For long-term storage, keep Prometheus here and remote-write to Mimir instead.
      enableRemoteWriteReceiver: true

  grafana:
    enabled: true
    # Disable init-chown-data to avoid permission issues with local-path storage
    initChownData:
      enabled: false
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://{{ .Release.Name }}-loki:3100
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
